name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # Fast checks — run on every push/PR (~30 seconds)
  # -----------------------------------------------------------------
  lint-and-unit:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup database
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          bun run db:push
          bun scripts/seed-ats.ts

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

  # -----------------------------------------------------------------
  # Reconciliation — UI values match API truth (~1 minute)
  # -----------------------------------------------------------------
  reconcile:
    name: UI/API Reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup database
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          bun run db:push
          bun scripts/seed-ats.ts

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start dev server
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          bun run dev &
          # Wait for server to be ready
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run reconciliation script
        run: bun scripts/reconcile.ts

      - name: Run count-things script
        run: bun scripts/count-things.ts

  # -----------------------------------------------------------------
  # E2E tests — full browser automation (~10 minutes)
  # -----------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup database
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          bun run db:push
          bun scripts/seed-ats.ts

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start dev server
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          bun run dev &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: bunx playwright test --reporter=github

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # -----------------------------------------------------------------
  # Build verification — ensure production build succeeds
  # -----------------------------------------------------------------
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup database
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: bun run db:push

      - name: Build
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: bun run build
